services:
  protonmail-bridge:
    image: dancwilliams/protonmail-bridge:latest@sha256:611f0597f6e6675c4773b99de140dce19de43561bfa0cf01c1f6c48a3b8f8018
    ports:
      - 1025:25/tcp
      - 1143:143/tcp
    restart: unless-stopped
    volumes:
      - protonmail:/root
    # Optional: set a passphrase to encrypt the GPG keyring (see README)
    # environment:
    #   - KEYRING_PASSPHRASE=your-passphrase-here

volumes:
  protonmail:
    name: protonmail
