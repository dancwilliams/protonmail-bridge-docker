services:
  protonmail-bridge:
    image: dancwilliams/protonmail-bridge:latest@sha256:84b7b7b5d9a0221c3d31fb9ecc96d36743729940eba3dd02567498e7693351a3
    ports:
      - 1025:25/tcp
      - 1143:143/tcp
    restart: unless-stopped
    volumes:
      - protonmail:/root
    # Optional: set a passphrase to encrypt the GPG keyring (see README)
    # environment:
    #   - KEYRING_PASSPHRASE=your-passphrase-here

volumes:
  protonmail:
    name: protonmail
