services:
  protonmail-bridge:
    image: dancwilliams/protonmail-bridge:latest@sha256:270240dda6635ceb5fc0f6ab2910c323564fdaab6a71992a1b5bfdf9503148c3
    ports:
      - 1025:25/tcp
      - 1143:143/tcp
    restart: unless-stopped
    volumes:
      - protonmail:/root
    # Optional: set a passphrase to encrypt the GPG keyring (see README)
    # environment:
    #   - KEYRING_PASSPHRASE=your-passphrase-here

volumes:
  protonmail:
    name: protonmail
