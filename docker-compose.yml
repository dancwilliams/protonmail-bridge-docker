services:
  protonmail-bridge:
    image: dancwilliams/protonmail-bridge:latest@sha256:0249317f91ba9e1980487894413485cfdcda18724d4bfc62c20a90725d562cc1
    ports:
      - 1025:25/tcp
      - 1143:143/tcp
    restart: unless-stopped
    volumes:
      - protonmail:/root
    # Optional: set a passphrase to encrypt the GPG keyring (see README)
    # environment:
    #   - KEYRING_PASSPHRASE=your-passphrase-here

volumes:
  protonmail:
    name: protonmail
