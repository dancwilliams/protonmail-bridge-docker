services:
  protonmail-bridge:
    image: dancwilliams/protonmail-bridge:latest@sha256:cdb95802a5dfe6da738573c37efa75966ad06b5a19a13c49d592e8e1ea46eebc
    ports:
      - 1025:25/tcp
      - 1143:143/tcp
    restart: unless-stopped
    volumes:
      - protonmail:/root
    # Optional: set a passphrase to encrypt the GPG keyring (see README)
    # environment:
    #   - KEYRING_PASSPHRASE=your-passphrase-here

volumes:
  protonmail:
    name: protonmail
