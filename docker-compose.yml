services:
  protonmail-bridge:
    image: dancwilliams/protonmail-bridge:latest@sha256:71d42e649be6a847c033142b1388f748ba30e17c7f2424764976933a251d9d3b
    ports:
      - 1025:25/tcp
      - 1143:143/tcp
    restart: unless-stopped
    volumes:
      - protonmail:/root
    # Optional: set a passphrase to encrypt the GPG keyring (see README)
    # environment:
    #   - KEYRING_PASSPHRASE=your-passphrase-here

volumes:
  protonmail:
    name: protonmail
