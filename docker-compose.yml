services:
  protonmail-bridge:
    image: dancwilliams/protonmail-bridge:latest@sha256:447faf06a1bb0565f5a81c87f6740c4761a367e9885d617b98715c8555908916
    ports:
      - 1025:25/tcp
      - 1143:143/tcp
    restart: unless-stopped
    volumes:
      - protonmail:/root
    # Optional: set a passphrase to encrypt the GPG keyring (see README)
    # environment:
    #   - KEYRING_PASSPHRASE=your-passphrase-here

volumes:
  protonmail:
    name: protonmail
