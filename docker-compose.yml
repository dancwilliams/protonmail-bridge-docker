services:
  protonmail-bridge:
    image: dancwilliams/protonmail-bridge:latest@sha256:2e255fde095cf38261f72a7a3f689a904cd435902a66a8fc61bd49dc8885fe16
    ports:
      - 1025:25/tcp
      - 1143:143/tcp
    restart: unless-stopped
    volumes:
      - protonmail:/root
    # Optional: set a passphrase to encrypt the GPG keyring (see README)
    # environment:
    #   - KEYRING_PASSPHRASE=your-passphrase-here

volumes:
  protonmail:
    name: protonmail
