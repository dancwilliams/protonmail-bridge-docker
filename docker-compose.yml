services:
  protonmail-bridge:
    image: dancwilliams/protonmail-bridge:latest@sha256:83a1eff7c32a084732d3e4954ba7d6498f5de2e03b7c27a992addf8485c676e8
    ports:
      - 1025:25/tcp
      - 1143:143/tcp
    restart: unless-stopped
    volumes:
      - protonmail:/root
    # Optional: set a passphrase to encrypt the GPG keyring (see README)
    # environment:
    #   - KEYRING_PASSPHRASE=your-passphrase-here

volumes:
  protonmail:
    name: protonmail
