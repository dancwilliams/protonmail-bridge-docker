services:
  protonmail-bridge:
    image: dancwilliams/protonmail-bridge:latest@sha256:5702d6a9300ef25e41352856867bf6cdc749f21f147650464a17c047546b739b
    ports:
      - 1025:25/tcp
      - 1143:143/tcp
    restart: unless-stopped
    volumes:
      - protonmail:/root
    # Optional: set a passphrase to encrypt the GPG keyring (see README)
    # environment:
    #   - KEYRING_PASSPHRASE=your-passphrase-here

volumes:
  protonmail:
    name: protonmail
