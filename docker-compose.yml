services:
  protonmail-bridge:
    image: dancwilliams/protonmail-bridge:latest@sha256:aa351c29408518aae76a9b66e6e937d8f1d6554565126ab8a13e24a4ee1262ae
    ports:
      - 1025:25/tcp
      - 1143:143/tcp
    restart: unless-stopped
    volumes:
      - protonmail:/root
    # Optional: set a passphrase to encrypt the GPG keyring (see README)
    # environment:
    #   - KEYRING_PASSPHRASE=your-passphrase-here

volumes:
  protonmail:
    name: protonmail
